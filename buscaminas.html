<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscaminas de Google</title>
    <style>
        body {
            font-family: 'Google Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
            overflow: hidden; /* Evitar scrollbar */
        }

        #game-container {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            text-align: center;
            position: relative;
        }

        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-weight: bold;
            color: #333;
        }

        #mine-count, #timer {
            font-size: 1.5em;
            width: 80px;
            background-color: #eee;
            border-radius: 4px;
            padding: 5px 0;
            text-align: center;
            font-family: 'Roboto Mono', monospace; /* Para números */
            color: #d10000; /* Color rojo para los números */
        }

        #reset-button {
            background-color: #e0e0e0;
            border: 1px solid #ccc;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            transition: background-color 0.2s, transform 0.1s;
            min-width: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #reset-button:hover {
            background-color: #d0d0d0;
        }
        #reset-button:active {
            transform: scale(0.95);
        }

        #board {
            display: grid;
            border: 2px solid #ccc;
            border-radius: 4px;
            overflow: hidden;
            /* Aquí vamos a ajustar el tamaño de las celdas con variables CSS */
        }

        .cell {
            background-color: #e0e0e0;
            border: 1px solid #c0c0c0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.1s ease-in-out;
            position: relative;

            /* Las variables CSS definirán el tamaño y la fuente */
            width: var(--cell-size, 30px);
            height: var(--cell-size, 30px);
            font-size: var(--font-size, 1.2em);
        }

        .cell.hidden:hover {
            background-color: #d0d0d0;
        }

        .cell.revealed {
            background-color: #f0f0f0;
            cursor: default;
        }

        .cell.mine {
            background-color: #ff8080;
        }

        .cell.exploded-mine {
            background-color: #ff0000;
        }

        .cell.flag::before {
            content: '🚩';
            font-size: var(--font-size, 1.2em); /* Ajustar tamaño de bandera */
        }

        .cell.question::before {
            content: '❓';
            font-size: var(--font-size, 1.2em); /* Ajustar tamaño de interrogante */
        }

        /* Colores de los números de las minas adyacentes */
        .cell.revealed[data-mines="1"] { color: #0000ff; }
        .cell.revealed[data-mines="2"] { color: #008000; }
        .cell.revealed[data-mines="3"] { color: #ff0000; }
        .cell.revealed[data-mines="4"] { color: #000080; }
        .cell.revealed[data-mines="5"] { color: #800000; }
        .cell.revealed[data-mines="6"] { color: #008080; }
        .cell.revealed[data-mines="7"] { color: #000000; }
        .cell.revealed[data-mines="8"] { color: #808080; }

        .difficulty-selector {
            margin-top: 20px;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .difficulty-selector button {
            background-color: #e0e0e0;
            border: 1px solid #ccc;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            color: #333;
            transition: background-color 0.2s, color 0.2s;
        }

        .difficulty-selector button:hover {
            background-color: #d0d0d0;
        }

        .difficulty-selector button.active {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        /* Fuentes personalizadas para simular Google */
        @font-face {
            font-family: 'Google Sans';
            src: url('https://fonts.gstatic.com/s/googlesans/v11/4UaGrENHsxJlGDuGo1OIlL3Owp4.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Roboto Mono';
            src: url('https://fonts.gstatic.com/s/robotomono/v13/L0xoKFOjNIPH9_jBfS2sYl_aU2Lh1y3Hj8B4.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="difficulty-selector">
            <button id="easy-btn" data-difficulty="easy">Fácil</button>
            <button id="medium-btn" data-difficulty="medium">Normal</button>
            <button id="hard-btn" data-difficulty="hard">Difícil</button>
        </div>
        <div id="header">
            <div id="mine-count">000</div>
            <button id="reset-button">Reiniciar</button>
            <div id="timer">000</div>
        </div>
        <div id="board"></div>
    </div>

    <script>
        const board = document.getElementById('board');
        const gameContainer = document.getElementById('game-container'); // Obtener el contenedor principal
        const mineCountDisplay = document.getElementById('mine-count');
        const timerDisplay = document.getElementById('timer');
        const resetButton = document.getElementById('reset-button');
        const easyBtn = document.getElementById('easy-btn');
        const mediumBtn = document.getElementById('medium-btn');
        const hardBtn = document.getElementById('hard-btn');

        let rows, cols, mines;
        let grid = [];
        let revealedCells = 0;
        let gameStarted = false;
        let gameOver = false;
        let timerInterval;
        let timeElapsed = 0;
        let flagsPlaced = 0;
        let currentDifficulty = 'easy'; // Dificultad inicial

        const difficulties = {
            easy: { rows: 8, cols: 8, mines: 10, cellSize: 30, fontSize: '1.2em' },
            medium: { rows: 16, cols: 16, mines: 40, cellSize: 25, fontSize: '1em' }, // Reducir tamaño de celda
            hard: { rows: 16, cols: 30, mines: 99, cellSize: 20, fontSize: '0.9em' } // Reducir aún más
        };

        function setDifficulty(difficulty) {
            currentDifficulty = difficulty;
            rows = difficulties[difficulty].rows;
            cols = difficulties[difficulty].cols;
            mines = difficulties[difficulty].mines;

            // Ajustar el tamaño de las celdas y la fuente a través de variables CSS
            document.documentElement.style.setProperty('--cell-size', `${difficulties[difficulty].cellSize}px`);
            document.documentElement.style.setProperty('--font-size', difficulties[difficulty].fontSize);

            // Actualizar botones de dificultad
            easyBtn.classList.remove('active');
            mediumBtn.classList.remove('active');
            hardBtn.classList.remove('active');
            document.getElementById(`${difficulty}-btn`).classList.add('active');

            newGame();
        }

        function createBoard() {
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            board.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

            grid = Array(rows).fill(0).map(() => Array(cols).fill(0)); // Inicializar con 0s

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell', 'hidden');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.addEventListener('click', handleCellClick);
                    cell.addEventListener('contextmenu', handleCellRightClick); // Clic derecho
                    board.appendChild(cell);
                }
            }
        }

        function placeMines(initialRow, initialCol) {
            let minesPlaced = 0;
            while (minesPlaced < mines) {
                const r = Math.floor(Math.random() * rows);
                const c = Math.floor(Math.random() * cols);

                // Evitar colocar mina en la primera celda clicada y sus adyacentes
                if (grid[r][c] !== 'mine' &&
                    !(Math.abs(r - initialRow) <= 1 && Math.abs(c - initialCol) <= 1)) {
                    grid[r][c] = 'mine';
                    minesPlaced++;
                }
            }
        }

        function calculateAdjacentMines() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] !== 'mine') {
                        let count = 0;
                        for (let dr = -1; dr <= 1; dr++) {
                            for (let dc = -1; dc <= 1; dc++) {
                                const nr = r + dr;
                                const nc = c + dc;
                                if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[nr][nc] === 'mine') {
                                    count++;
                                }
                            }
                        }
                        grid[r][c] = count;
                    }
                }
            }
        }

        function startGame(initialRow, initialCol) {
            gameStarted = true;
            placeMines(initialRow, initialCol);
            calculateAdjacentMines();
            startTimer();
        }

        function handleCellClick(event) {
            if (gameOver) return;

            const cell = event.target;
            const r = parseInt(cell.dataset.row);
            const c = parseInt(cell.dataset.col);

            if (!gameStarted) {
                startGame(r, c);
            }

            if (cell.classList.contains('revealed') || cell.classList.contains('flag')) {
                if (cell.classList.contains('revealed') && cell.textContent !== '') {
                    const adjacentMinesCount = parseInt(cell.dataset.mines);
                    if (isNaN(adjacentMinesCount) || adjacentMinesCount === 0) return;

                    let adjacentFlags = 0;
                    const neighbors = getNeighbors(r, c);
                    for (const { nr, nc } of neighbors) {
                        const neighborCell = board.querySelector(`.cell[data-row="${nr}"][data-col="${nc}"]`);
                        if (neighborCell && neighborCell.classList.contains('flag')) {
                            adjacentFlags++;
                        }
                    }

                    if (adjacentFlags === adjacentMinesCount) {
                        for (const { nr, nc } of neighbors) {
                            const neighborCell = board.querySelector(`.cell[data-row="${nr}"][data-col="${nc}"]`);
                            if (neighborCell && neighborCell.classList.contains('hidden') && !neighborCell.classList.contains('flag')) {
                                revealCell(nr, nc);
                            }
                        }
                    }
                }
                return;
            }

            revealCell(r, c);
        }

        function handleCellRightClick(event) {
            event.preventDefault();
            if (gameOver) return;

            const cell = event.target;
            const r = parseInt(cell.dataset.row);
            const c = parseInt(cell.dataset.col);

            if (cell.classList.contains('revealed')) return;

            if (cell.classList.contains('flag')) {
                cell.classList.remove('flag');
                cell.classList.add('question');
                flagsPlaced--;
            } else if (cell.classList.contains('question')) {
                cell.classList.remove('question');
            } else if (flagsPlaced < mines) {
                cell.classList.add('flag');
                flagsPlaced++;
            }
            updateMineCountDisplay();
        }

        function revealCell(r, c) {
            if (r < 0 || r >= rows || c < 0 || c >= cols) return;
            const cell = board.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);

            if (!cell || cell.classList.contains('revealed') || cell.classList.contains('flag')) {
                return;
            }

            cell.classList.remove('hidden', 'question');
            cell.classList.add('revealed');
            revealedCells++;

            const cellValue = grid[r][c];

            if (cellValue === 'mine') {
                cell.classList.add('mine', 'exploded-mine');
                endGame(false, r, c);
                return;
            } else if (cellValue > 0) {
                cell.textContent = cellValue;
                cell.dataset.mines = cellValue;
            } else {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr !== 0 || dc !== 0) {
                            revealCell(r + dr, c + dc);
                        }
                    }
                }
            }
            checkWin();
        }

        function getNeighbors(r, c) {
            const neighbors = [];
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr !== 0 || dc !== 0) {
                        const nr = r + dr;
                        const nc = c + dc;
                        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
                            neighbors.push({ nr, nc });
                        }
                    }
                }
            }
            return neighbors;
        }

        function checkWin() {
            if (revealedCells === (rows * cols) - mines) {
                endGame(true);
            }
        }

        function endGame(won, explodedRow, explodedCol) {
            gameOver = true;
            clearInterval(timerInterval);

            if (won) {
                resetButton.textContent = 'Victoria';
                mineCountDisplay.textContent = '000';
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const cell = board.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
                        if (grid[r][c] === 'mine' && !cell.classList.contains('flag')) {
                            cell.classList.add('flag');
                        }
                    }
                }
            } else {
                resetButton.textContent = 'Derrota';
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const cell = board.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
                        if (grid[r][c] === 'mine' && !cell.classList.contains('exploded-mine')) {
                            if (!cell.classList.contains('flag')) {
                                cell.classList.remove('hidden', 'question');
                                cell.classList.add('revealed', 'mine');
                            }
                        } else if (cell.classList.contains('flag') && grid[r][c] !== 'mine') {
                            cell.classList.remove('flag');
                            cell.classList.add('mine');
                            cell.textContent = '❌';
                        }
                    }
                }
            }
        }

        function startTimer() {
            timeElapsed = 0;
            timerDisplay.textContent = '000';
            timerInterval = setInterval(() => {
                timeElapsed++;
                if (timeElapsed > 999) {
                    timeElapsed = 999;
                    clearInterval(timerInterval);
                }
                timerDisplay.textContent = String(timeElapsed).padStart(3, '0');
            }, 1000);
        }

        function updateMineCountDisplay() {
            const remainingMines = mines - flagsPlaced;
            mineCountDisplay.textContent = String(remainingMines).padStart(3, '0');
        }

        function newGame() {
            clearInterval(timerInterval);
            gameStarted = false;
            gameOver = false;
            timeElapsed = 0;
            revealedCells = 0;
            flagsPlaced = 0;
            resetButton.textContent = 'Reiniciar';
            timerDisplay.textContent = '000';
            updateMineCountDisplay();
            createBoard();
        }

        // Event listeners para los botones de dificultad
        easyBtn.addEventListener('click', () => setDifficulty('easy'));
        mediumBtn.addEventListener('click', () => setDifficulty('medium'));
        hardBtn.addEventListener('click', () => setDifficulty('hard'));
        resetButton.addEventListener('click', newGame);

        // Inicializar el juego al cargar la página con la dificultad predeterminada
        setDifficulty(currentDifficulty);
    </script>
</body>
</html>
